name: Security Pipeline (Docker + SBOM + Semgrep + Gitleaks)

permissions:
  contents: read
  packages: write       # GHCR'ye push için
  security-events: write # SARIF raporlarını GitHub Security sekmesine yüklemek için

on:
  push:
    branches: [ master ]
  pull_request:

env:
  IMAGE: ghcr.io/wicknaer/juice-shop-bogazici

jobs:
  build-and-sbom:
    name: Docker Build & SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft ${{ env.IMAGE }}:${{ github.sha }} -o spdx-json --file sbom.spdx.json
          syft ${{ env.IMAGE }}:${{ github.sha }} -o cyclonedx-json --file sbom.cdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-files
          path: sbom.*.json

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    needs: build-and-sbom
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci p/security-audit
          generateSarif: true
        continue-on-error: true # Zafiyet bulsa da pipeline'ı yeşil bırakır, raporu GitHub'a atar

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    needs: build-and-sbom
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks Action
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --report-format sarif --report-path gitleaks.sarif --redact
        continue-on-error: true # Juice-shop içindeki secret'lar pipeline'ı kırmasın

      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gitleaks.sarif
